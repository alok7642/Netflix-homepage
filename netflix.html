<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix India-Watch TV Shows</title> 
    <link rel="shortcut icon" href="image/netflix-icon.ico">   
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">

    <style>
        .cover{
            background-color: rgba(0,0,0,0.8);
            height:100vh;
            width: 100vw;
            margin-top: -10px;
            margin-left: -10px;
            margin-bottom: -10px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .head{
            padding-top: 30px;
            display: flex;
            justify-content: space-around;
        }
        .netflix-title{
            font-size: 50px;
            color: red;
            font-weight: bold;
        }
        .language{
            border: 1px solid rgb(156, 151, 151);
            padding: 10px 15px 10px 15px;
            color: white;
            background-color: rgba(0,0,0,0.8);
            border-radius: 5px;
            margin-right: 10px;


        }
        .bi-caret-down-fill , .bi-translate{
            color: white;
        }
        .signin{
            background-color: red;
            padding: 10px 15px 10px 15px;
            color: white;
            border-radius: 5px;

        }
        .content{
           text-align: center;
            color: white;
            margin-top: 200px;

        }
 .content .text {
    font-size:60px;
    font-weight: bold;

 }
 .start149{
    display: inline-block;
    margin-top: 30px;
    margin-bottom: 30px;
 }

 .email{
    display: inline-block;
    border: 1px solid white;
    background-color: rgba(0,0,0,0.8);
    padding: 15px 200px 15px 15px;
    border-radius: 5px;
   

}
.getstarted{
    display: inline-block;
    border: 1px solid white;
    background-color: red;
    padding: 15px 25px 15px 25px;
    border-radius: 5px;
    margin-top: 30px;
    


}
.text .start149{
    display: inline-block;
}


    </style>
    </head>
<body background="image/netflix-background.jpg" >
    <div class="cover">
        <header class="head">
            <div class="netflix-title">NETFLIX</div>
            <div>
                <span class="bi bi-translate language">Englsih <span class="bi bi-caret-down-fill"></span> </span>
                <span class="signin"> Sign In</span>
            </div>               
        </header>

        <div class="content">
            <span class="text">Unlimited movies, TV</span><br>
            <span class="text"> shows and more</span> <br>
            <span class="start149">Starts at ₹149. Cancel at any time.</span><br>

         <main class="membership">            
            <span class="watch">Ready to watch? Enter your email to create or restart your membership.</span><br>
            <span class="email"> Email address</span>  
            <span class="getstarted">Get Started  <span class="bi bi-chevron-right"></span></span>
        </main>

        </div>
    </div>
    
</body>
</html>
